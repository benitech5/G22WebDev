<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practitioner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Login.css">
  </head>

  <body>
    <header class="pl-page-head">
      <a class="pl-brand" href="../../Landingpage.html">
        <img src="../../SuperAdmin/assets/logo.png" alt="" width="40" height="40" />
        <span class="pl-brand-text">HealthLinka</span>
      </a>
    </header>
    <p class="pl-kicker">PRACTITIONER PORTAL</p>
    <h1 class="pl-title">Practitioner Login</h1>

    <div class="Contain">
      <form id="loginForm">

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">

        <span class="error" id="usernameError"></span>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <span class="error" id="passwordError"></span>

        <span class="error" id="generalError"></span>

        <button type="submit" id="loginBtn" class="pl-submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Login
        </button>

      </form>

      <hr>
      <p>Don't have an account? <a href="Signup.html" class="Account">Create an Account</a></p>
    </div>

    <footer>
      <p>&copy; 2026 HealthLinka Inc. All rights reserved.</p>
      <p>Privacy Policy &nbsp; Terms of Service &nbsp; Support</p>
    </footer>

    <script src="Login.js"></script>
  </body>
</html>
